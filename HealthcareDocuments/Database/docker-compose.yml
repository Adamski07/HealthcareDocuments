services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: healthcare-documents-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DBPASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data: